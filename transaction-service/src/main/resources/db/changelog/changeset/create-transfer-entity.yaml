databaseChangeLog:
  - changeSet:
      id: 001-create-transfers-table
      author: Alisher
      changes:
        - createTable:
            tableName: transfers
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: idempotency_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: from_account_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: to_account_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL(19,4)
                  constraints:
                    nullable: false

              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(10)
                  constraints:
                    nullable: false

              - column:
                  name: initiated_by
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

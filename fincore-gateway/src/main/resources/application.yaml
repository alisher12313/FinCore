spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: account-service
              uri: http://localhost:8080
              predicates:
                - Path=/account/**

            - id: transaction-service
              uri: http://localhost:8082
              predicates:
                - Path=/transfer/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/fincore